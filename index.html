<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام توثيق الشواهد - الدخول</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f2f5; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .container { background: white; padding: 2rem; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 400px; }
        h2 { text-align: center; color: #1a73e8; }
        .form-group { margin-bottom: 1rem; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input, select { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background-color: #1a73e8; color: white; border: none; border-radius: 5px; cursor: pointer; font-size: 16px; margin-top: 10px; }
        button:hover { background-color: #1557b0; }
        .toggle-link { text-align: center; margin-top: 15px; font-size: 14px; color: #555; cursor: pointer; text-decoration: underline; }
        .hidden { display: none; }
    </style>
</head>
<body>

<div class="container">
    <!-- نموذج تسجيل الدخول -->
    <div id="loginForm">
        <h2>تسجيل الدخول</h2>
        <div class="form-group">
            <label>اسم المستخدم</label>
            <input type="text" id="logUser" placeholder="أدخل اسم المستخدم">
        </div>
        <div class="form-group">
            <label>كلمة المرور</label>
            <input type="password" id="logPass" placeholder="أدخل كلمة المرور">
        </div>
        <button onclick="login()">دخول</button>
        <p class="toggle-link" onclick="toggleForms()">ليس لديك حساب؟ سجل الآن</p>
    </div>

    <!-- نموذج التسجيل الجديد -->
    <div id="registerForm" class="hidden">
        <h2>تسجيل حساب جديد</h2>
        <div class="form-group">
            <label>الاسم الكامل</label>
            <input type="text" id="regName" placeholder="الاسم الثلاثي">
        </div>
        <div class="form-group">
            <label>اسم المستخدم</label>
            <input type="text" id="regUser" placeholder="يستخدم للدخول">
        </div>
        <div class="form-group">
            <label>الدور الوظيفي</label>
            <select id="regRole">
                <option value="معلم">معلم</option>
                <option value="وكيل">وكيل</option>
                <option value="موجه طلابي">موجه طلابي</option>
                <option value="رائد نشاط">رائد نشاط</option>
                <option value="محضر مختبر">محضر مختبر</option>
            </select>
        </div>
        <div class="form-group">
            <label>كلمة المرور</label>
            <input type="password" id="regPass" placeholder="أرقام أو حروف">
        </div>
        <button onclick="register()">إنشاء الحساب</button>
        <p class="toggle-link" onclick="toggleForms()">لديك حساب بالفعل؟ دخول</p>
    </div>
</div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzxVQCCJRZaptxBssvkq1dmn0Dk_FSKv1y-Q2UaOlIDcAT8nvMC98U34rx9ZB5Zk4sG/exec"; // ضع رابط الـ Web App الخاص بك هنا

    // التبديل بين نماذج الدخول والتسجيل
    function toggleForms() {
        document.getElementById('loginForm').classList.toggle('hidden');
        document.getElementById('registerForm').classList.toggle('hidden');
    }

    // دالة التسجيل
    async function register() {
        const payload = {
            action: "register",
            fullname: document.getElementById('regName').value,
            username: document.getElementById('regUser').value,
            role: document.getElementById('regRole').value,
            password: document.getElementById('regPass').value
        };

        if(!payload.fullname || !payload.username || !payload.password) {
            alert("يرجى تعبئة كافة الحقول");
            return;
        }

        const response = await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify(payload) });
        const result = await response.json();

        if (result === "exists") {
            alert("اسم المستخدم موجود مسبقاً، اختر اسماً آخر");
        } else if (result === "success") {
            alert("تم التسجيل بنجاح! يمكنك الآن تسجيل الدخول");
            toggleForms();
        }
    }

    // دالة تسجيل الدخول
    async function login() {
        const payload = {
            action: "login",
            username: document.getElementById('logUser').value,
            password: document.getElementById('logPass').value
        };

        const response = await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify(payload) });
        const result = await response.json();

        if (result.status === "success") {
            // حفظ البيانات في ذاكرة المتصفح للانتقال لصفحة الشواهد
            localStorage.setItem("userName", result.fullname);
            localStorage.setItem("userRole", result.role);
            localStorage.setItem("userID", payload.username);
            if(result.role === "مدير") {
                window.location.href = "admin.html";
            } else {
                window.location.href = "dashboard.html";
            }
           
        } else {
            alert("اسم المستخدم أو كلمة المرور غير صحيحة");
        }
    }
</script>

</body>
</html>
