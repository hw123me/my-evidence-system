<!doctype html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>إدارة النظام - استعراض الشواهد</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css" />
    <link rel="stylesheet" href="style.css" />
    <style>
        /* تحسينات إضافية للبطاقات والبحث */
        .stat-card-custom {
            transition: transform 0.3s ease;
            border-radius: 15px;
        }
        .stat-card-custom:hover {
            transform: translateY(-5px);
        }
        .icon-box {
            width: 50px;
            height: 50px;
            background: rgba(59, 130, 246, 0.1);
            color: #3b82f6;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
        }
        #adminSearch:focus {
            box-shadow: 0 0 0 0.25 dark-blue;
            border: 1px solid #3b82f6;
        }
    </style>
</head>
<body class="bg-light">

    <nav class="navbar navbar-expand-lg navbar-dark shadow-sm sticky-top mb-4" 
         style="background: linear-gradient(135deg, #1e3a8a 0%, #3b82f6 100%); border-bottom: 3px solid #fbbf24;">
        <div class="container py-1">
            <div class="navbar-brand d-flex align-items-center">
                <div class="bg-white text-primary rounded-3 d-flex justify-content-center align-items-center me-3 shadow-sm" 
                     style="width: 40px; height: 40px; font-size: 1.2rem;">🛡️</div>
                <div>
                    <span class="h5 mb-0 fw-bold d-block text-white">إدارة الشواهد</span>
                    <small class="text-white-50 fw-light" style="font-size: 0.75rem; letter-spacing: 1px;">لوحة تحكم المدير</small>
                </div>
            </div>
            <div class="ms-auto">
                <button class="btn btn-link text-white text-decoration-none fw-bold d-flex align-items-center gap-2 border border-white-50 rounded-pill px-3 py-1 hover-opacity" 
                        onclick="logout()" style="background: rgba(255,255,255,0.1);">
                    <span class="small">خروج</span>
                    <span>🚪</span>
                </button>
            </div>
        </div>
    </nav>

    <div class="container pb-5">
        <div class="row g-4 mb-4">
            <div class="col-md-6">
                <div class="card stat-card-custom border-0 shadow-sm p-2 border-start border-primary border-5 h-100">
                    <div class="card-body d-flex align-items-center">
                        <div class="icon-box me-3">📊</div>
                        <div>
                            <h6 class="text-muted mb-1 small fw-bold text-uppercase">إجمالي الشواهد</h6>
                            <h2 id="totalCount" class="mb-0 fw-bold text-primary">0</h2>
                        </div>
                    </div>
                </div>
            </div>
            <div class="col-md-6">
                <div class="card stat-card-custom border-0 shadow-sm p-2 border-start border-success border-5 h-100">
                    <div class="card-body d-flex align-items-center">
                        <div class="icon-box me-3 text-success" style="background: rgba(25, 135, 84, 0.1);">📅</div>
                        <div>
                            <h6 class="text-muted mb-1 small fw-bold text-uppercase">تحديثات اليوم</h6>
                            <h2 id="todayCount" class="mb-0 fw-bold text-success">0</h2>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="row mb-4">
            <div class="col-12">
                <div class="input-group shadow-sm border-0 rounded-3 overflow-hidden">
                    <span class="input-group-text bg-white border-0 ps-3">🔍</span>
                    <input type="text" id="adminSearch" class="form-control border-0 py-3" 
                           placeholder="ابحث باسم المعلم أو عنوان الشاهد..." onkeyup="filterAdminTable()">
                </div>
            </div>
        </div>

        <div class="card shadow-sm border-0 rounded-4 overflow-hidden">
            <div class="card-header bg-white py-3 border-bottom d-flex justify-content-between align-items-center">
                <h5 class="mb-0 fw-bold text-dark">سجل المرفوعات الأخير</h5>
                <span class="badge bg-secondary rounded-pill fw-light px-3">محدث لحظياً</span>
            </div>
            <div class="card-body p-0">
                <div id="loading" class="text-center py-5">
                    <div class="spinner-border text-primary" role="status"></div>
                    <p class="mt-3 text-secondary fw-bold">جاري جلب بيانات الشواهد المرفوعة...</p>
                </div>

                <div class="table-responsive">
                    <table id="adminTable" class="table table-hover align-middle mb-0 text-center" style="display: none">
                        <thead class="table-light">
                            <tr>
                                <th class="py-3 px-4 text-start">الوقت والتاريخ</th>
                                <th class="py-3">اسم المعلم</th>
                                <th class="py-3">اسم الشاهد</th>
                                <th class="py-3">الإجراء</th>
                            </tr>
                        </thead>
                        <tbody id="adminBody"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzxVQCCJRZaptxBssvkq1dmn0Dk_FSKv1y-Q2UaOlIDcAT8nvMC98U34rx9ZB5Zk4sG/exec";

        if (localStorage.getItem("userRole") !== "مدير") {
            window.location.href = "index.html";
        } else {
            loadAdminData();
        }

        async function loadAdminData() {
            try {
                const response = await fetch(SCRIPT_URL, {
                    method: "POST",
                    body: JSON.stringify({ action: "getAllSubmissions" }),
                });
                const data = await response.json();

                document.getElementById("loading").style.display = "none";
                document.getElementById("adminTable").style.display = "table";

                // تحديث الأرقام
                document.getElementById("totalCount").innerText = data.length;
                const today = new Date().toLocaleDateString();
                const todaySubmissions = data.filter(row => row.date && new Date(row.date).toLocaleDateString() === today).length;
                document.getElementById("todayCount").innerText = todaySubmissions;

                const tableBody = document.getElementById("adminBody");
                tableBody.innerHTML = "";
                data.reverse().forEach((row) => {
                    const tr = `
                        <tr>
                            <td class="px-4 text-start small text-muted">${new Date(row.date).toLocaleString('ar-SA')}</td>
                            <td class="fw-bold text-dark">${row.username}</td>
                            <td><span class="badge bg-info-subtle text-info border border-info-subtle px-3 py-2 rounded-2">${row.evidenceTitle}</span></td>
                            <td>
                                <a href="${row.fileUrl}" target="_blank" class="btn btn-primary btn-sm px-3 fw-bold shadow-sm">👁️ فتح الملف</a>
                            </td>
                        </tr>`;
                    tableBody.innerHTML += tr;
                });
            } catch (error) {
                document.getElementById("loading").innerHTML = `<div class="alert alert-danger m-3">❌ حدث خطأ في الاتصال بالسيرفر.</div>`;
            }
        }

        function filterAdminTable() {
            let input = document.getElementById("adminSearch");
            let filter = input.value.toLowerCase();
            let table = document.getElementById("adminTable");
            let tr = table.getElementsByTagName("tr");

            for (let i = 1; i < tr.length; i++) {
                let tdName = tr[i].getElementsByTagName("td")[1];
                let tdTitle = tr[i].getElementsByTagName("td")[2];
                if (tdName || tdTitle) {
                    let textValue = (tdName.textContent || tdName.innerText) + " " + (tdTitle.textContent || tdTitle.innerText);
                    tr[i].style.display = textValue.toLowerCase().indexOf(filter) > -1 ? "" : "none";
                }
            }
        }

        function logout() {
            localStorage.clear();
            window.location.href = "index.html";
        }
    </script>
</body>
</html>
