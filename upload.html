<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>رفع الشاهد - نظام التوثيق</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css"
    />
  </head>
  <body>
    <body class="bg-light d-flex align-items-center vh-100">
      <div class="container">
        <div class="row justify-content-center">
          <div class="col-md-7 col-lg-6">
            <div class="card shadow-lg border-0 rounded-4 overflow-hidden">
              <div class="card-header bg-primary text-white text-center py-4">
                <h4 class="mb-1 fw-bold">
                  رفع شاهد:
                  <span id="targetEvidence" class="text-warning">...</span>
                </h4>
                <p class="mb-0 small opacity-75">
                  المستخدم الحالي:
                  <span id="userDisplay" class="fw-bold text-white">...</span>
                </p>
              </div>

              <div class="card-body p-4 p-md-5 text-center">
                <div
                  class="file-drop-area border border-2 border-dashed rounded-4 p-5 mb-4 position-relative bg-light transition-all"
                  id="dropArea"
                >
                  <div class="mb-3">
                    <span class="display-4 text-primary opacity-50">📤</span>
                  </div>
                  <h6 id="fileNameDisplay" class="text-secondary fw-bold">
                    اضغط هنا لاختيار الملف أو اسحبه إلى هنا
                  </h6>
                  <p class="text-muted small mb-0">
                    يدعم كافة أنواع الملفات (صور، PDF، Word)
                  </p>
                  <input
                    type="file"
                    id="fileInput"
                    onchange="updateFileName()"
                    class="position-absolute top-0 start-0 w-100 h-100 opacity-0 cursor-pointer"
                  />
                </div>

                <div
                  id="uploadProgress"
                  class="progress mb-3 d-none"
                  style="height: 10px"
                >
                  <div
                    class="progress-bar progress-bar-striped progress-bar-animated bg-success"
                    role="progressbar"
                    style="width: 100%"
                  ></div>
                </div>

                <div class="d-grid gap-2">
                  <button
                    class="btn btn-success btn-lg fw-bold shadow-sm py-3"
                    onclick="uploadProcess()"
                  >
                    <span id="btnText">ابدأ عملية الرفع</span>
                  </button>

                  <div id="status" class="mt-3"></div>

                  <button
                    class="btn btn-link text-decoration-none text-secondary mt-3"
                    onclick="location.href = 'dashboard.html'"
                  >
                    <i class="bi bi-arrow-right"></i> ← العودة للوحة التحكم
                  </button>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </body>

    <script>
      const SCRIPT_URL =
        "https://script.google.com/macros/s/AKfycbzxVQCCJRZaptxBssvkq1dmn0Dk_FSKv1y-Q2UaOlIDcAT8nvMC98U34rx9ZB5Zk4sG/exec";

      const selectedEvidence = localStorage.getItem("selectedEvidence");
      const username = localStorage.getItem("userID");

      document.getElementById("targetEvidence").innerText =
        selectedEvidence || "غير محدد";
      document.getElementById("userDisplay").innerText = username || "زائر";

      function updateFileName() {
        const input = document.getElementById("fileInput");
        const display = document.getElementById("fileNameDisplay");
        if (input.files.length > 0) {
          display.innerText = "تم اختيار: " + input.files[0].name;
          display.style.color = "#1a73e8";
          display.style.fontWeight = "bold";
        }
      }

      function uploadProcess() {
        const fileInput = document.getElementById("fileInput");
        const status = document.getElementById("status");

        if (fileInput.files.length === 0) {
          alert("الرجاء اختيار ملف أولاً");
          return;
        }

        const file = fileInput.files[0];
        const reader = new FileReader();
        status.innerHTML =
          '<span class="loading">⏳ جاري معالجة الملف...</span>';

        reader.onload = async function (e) {
          const base64Data = e.target.result.split(",")[1];
          const payload = {
            action: "uploadFile",
            username: username,
            evidenceTitle: selectedEvidence,
            fileName: file.name,
            mimeType: file.type,
            base64Data: base64Data,
          };

          status.innerHTML =
            '<span class="loading">☁️ جاري الرفع للسحابة... يرجى الانتظار</span>';

          try {
            const response = await fetch(SCRIPT_URL, {
              method: "POST",
              body: JSON.stringify(payload),
            });
            const result = await response.json();

            if (result.status === "success") {
              status.innerHTML =
                "<b style='color:#28a745;'>✅ تم الرفع بنجاح وحفظ الرابط!</b>";
              fileInput.value = "";
              document.getElementById("fileNameDisplay").innerText =
                "اضغط لاختيار ملف آخر";
            } else {
              status.innerHTML =
                "<b style='color:#dc3545;'>❌ خطأ: " + result.message + "</b>";
            }
          } catch (error) {
            status.innerHTML =
              "<b style='color:#dc3545;'>❌ حدث خطأ في الاتصال بالسيرفر</b>";
          }
        };

        reader.readAsDataURL(file);
      }
    </script>
  </body>
</html>
