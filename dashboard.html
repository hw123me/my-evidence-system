<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة التحكم - نظام الشواهد</title>
    <style>
        :root {
            --primary-color: #1a73e8;
            --success-color: #28a745;
            --bg-color: #f8f9fa;
            --text-dark: #333;
            --shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            padding: 0;
            color: var(--text-dark);
        }

        /* رأس الصفحة Header */
        header {
            background-color: white;
            padding: 1rem 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: var(--shadow);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .user-info h2 { margin: 0; font-size: 1.2rem; color: var(--primary-color); }
        .user-info p { margin: 5px 0 0; font-size: 0.9rem; color: #666; }

        .btn-logout {
            background-color: #dc3545;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 5px;
            cursor: pointer;
            transition: 0.3s;
        }
        .btn-logout:hover { background-color: #c82333; }

        /* الحاوية الرئيسية */
        .container {
            max-width: 1000px;
            margin: 2rem auto;
            padding: 0 20px;
        }

        .welcome-section {
            text-align: center;
            margin-bottom: 3rem;
        }

        /* شبكة البطاقات */
        #evidenceContainer {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
        }

        .card {
            background: white;
            border-radius: 12px;
            padding: 20px;
            box-shadow: var(--shadow);
            transition: transform 0.3s ease;
            display: flex;
            flex-direction: column;
            border-top: 5px solid var(--primary-color);
        }

        .card:hover { transform: translateY(-5px); }

        .card h4 {
            margin-top: 0;
            color: var(--primary-color);
            font-size: 1.2rem;
        }

        .card p {
            color: #555;
            font-size: 0.95rem;
            line-height: 1.6;
            flex-grow: 1; /* لجعل الأزرار متساوية في المحاذاة */
        }

        .btn-upload {
            background-color: var(--success-color);
            color: white;
            border: none;
            padding: 10px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            margin-top: 15px;
            transition: 0.3s;
        }

        .btn-upload:hover { opacity: 0.9; }

        /* رسالة التحميل */
        .loading-spinner {
            text-align: center;
            font-size: 1.2rem;
            color: #666;
            grid-column: 1 / -1;
            padding: 50px;
        }

        @media (max-width: 600px) {
            header { flex-direction: column; text-align: center; gap: 10px; }
            #evidenceContainer { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <header>
        <div class="user-info">
            <h2>مرحباً، <span id="displayName">...</span></h2>
            <p>الدور: <span id="displayRole">...</span></p>
        </div>
        <button class="btn-logout" onclick="logout()">تسجيل الخروج</button>
    </header>

    <div class="container">
        <div class="welcome-section">
            <h1>قائمة شواهد التوثيق</h1>
            <p>الرجاء اختيار الشاهد المناسب لرفع الملف الخاص به</p>
        </div>

        <div id="evidenceContainer">
            <div class="loading-spinner">جاري تحميل الشواهد المخصصة لدورك...</div>
        </div>
    </div>

    <script>
        const role = localStorage.getItem("userRole");
        const name = localStorage.getItem("userName");
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzxVQCCJRZaptxBssvkq1dmn0Dk_FSKv1y-Q2UaOlIDcAT8nvMC98U34rx9ZB5Zk4sG/exec";

        if (!role) {
            window.location.href = "index.html";
        }

        document.getElementById('displayName').innerText = name;
        document.getElementById('displayRole').innerText = role;

        async function loadEvidence() {
            try {
                const response = await fetch(SCRIPT_URL, {
                    method: 'POST',
                    body: JSON.stringify({ action: "getEvidence", role: role.trim() })
                });
                const evidenceList = await response.json();
                
                const container = document.getElementById('evidenceContainer');
                container.innerHTML = "";

                if (evidenceList.length === 0) {
                    container.innerHTML = "<p style='text-align:center; grid-column:1/-1;'>لا توجد شواهد مخصصة لدورك حالياً في النظام.</p>";
                    return;
                }

                evidenceList.forEach(item => {
                    const card = `
                        <div class="card">
                            <h4>${item.title}</h4>
                            <p>${item.description}</p>
                            <button class="btn-upload" onclick="goToUpload('${item.title}')">إرفاق ملف الشاهد</button>
                        </div>
                    `;
                    container.innerHTML += card;
                });
            } catch (error) {
                document.getElementById('evidenceContainer').innerHTML = "<p style='color:red;'>فشل تحميل البيانات. يرجى التحقق من اتصالك بالإنترنت.</p>";
            }
        }

        function goToUpload(title) {
            localStorage.setItem("selectedEvidence", title);
            window.location.href = "upload.html";
        }

        function logout() {
            localStorage.clear();
            window.location.href = "index.html";
        }

        loadEvidence();
    </script>
</body>
</html>
