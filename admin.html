<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>إدارة النظام - استعراض الشواهد</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css"
    />
  </head>
  <body>
    <nav class="navbar navbar-dark bg-dark shadow mb-4 sticky-top">
      <div class="container">
        <span class="navbar-brand mb-0 h1 fw-bold">
          <i class="bi bi-shield-lock-fill me-2"></i> إدارة الشواهد | لوحة تحكم
          المدير
        </span>
        <button class="btn btn-danger btn-sm fw-bold px-4" onclick="logout()">
          خروج <i class="bi bi-box-arrow-right ms-1"></i>
        </button>
      </div>
    </nav>

    <div class="container pb-5">
      <div class="row g-4 mb-5">
        <div class="col-md-6">
          <div
            class="card border-0 shadow-sm border-start border-primary border-5 py-3"
          >
            <div
              class="card-body d-flex align-items-center justify-content-between px-4"
            >
              <div>
                <h6 class="text-muted fw-bold mb-1">إجمالي الشواهد</h6>
                <h2 id="totalCount" class="display-5 fw-bold mb-0 text-primary">
                  0
                </h2>
              </div>
              <div class="fs-1 text-light">📊</div>
            </div>
          </div>
        </div>

        <div class="col-md-6">
          <div
            class="card border-0 shadow-sm border-start border-success border-5 py-3"
          >
            <div
              class="card-body d-flex align-items-center justify-content-between px-4"
            >
              <div>
                <h6 class="text-muted fw-bold mb-1">تحديثات اليوم</h6>
                <h2 id="todayCount" class="display-5 fw-bold mb-0 text-success">
                  0
                </h2>
              </div>
              <div class="fs-1 text-light">📅</div>
            </div>
          </div>
        </div>
      </div>

      <div class="card shadow-sm border-0 border-radius-15">
        <div class="card-header bg-white py-3 border-bottom">
          <h5 class="mb-0 fw-bold text-dark">سجل المرفوعات الأخير</h5>
        </div>
        <div class="card-body p-0">
          <div id="loading" class="text-center py-5">
            <div class="spinner-border text-primary" role="status"></div>
            <p class="mt-2 text-muted fw-bold">
              جاري جلب بيانات الشواهد المرفوعة...
            </p>
          </div>

          <div class="table-responsive">
            <table
              id="adminTable"
              class="table table-hover align-middle mb-0"
              style="display: none"
            >
              <thead class="table-light">
                <tr>
                  <th class="py-3 px-4">الوقت والتاريخ</th>
                  <th class="py-3 text-center">المعلم</th>
                  <th class="py-3 text-center">اسم الشاهد</th>
                  <th class="py-3 text-center">الإجراء</th>
                </tr>
              </thead>
              <tbody id="adminBody"></tbody>
            </table>
          </div>
        </div>
      </div>
    </div>

    <script>
      const SCRIPT_URL =
        "https://script.google.com/macros/s/AKfycbzxVQCCJRZaptxBssvkq1dmn0Dk_FSKv1y-Q2UaOlIDcAT8nvMC98U34rx9ZB5Zk4sG/exec";

      async function loadAdminData() {
        try {
          const response = await fetch(SCRIPT_URL, {
            method: "POST",
            body: JSON.stringify({ action: "getAllSubmissions" }),
          });
          const data = await response.json();

          const tableBody = document.getElementById("adminBody");
          document.getElementById("loading").style.display = "none";
          document.getElementById("adminTable").style.display = "table";

          // حساب الإحصائيات البسيطة
          document.getElementById("totalCount").innerText = data.length;

          // 1. الحصول على تاريخ اليوم بتنسيق محلي (مثلاً: 11/3/2026)
          const today = new Date().toLocaleDateString();

          // 2. فلترة البيانات مع تحويل تاريخ كل صف إلى تنسيق محلي قبل المقارنة
          const todaySubmissions = data.filter((row) => {
            // نتحقق من وجود تاريخ أولاً، ثم نحوله لتنسيق محلي للمقارنة
            if (!row.date) return false;
            const rowDate = new Date(row.date).toLocaleDateString();
            return rowDate === today;
          }).length;

          // 3. عرض النتيجة
          document.getElementById("todayCount").innerText = todaySubmissions;

          data.reverse().forEach((row) => {
            const tr = `
                        <tr>
                            <td>${row.date}</td>
                            <td style="font-weight:bold;">${row.username}</td>
                            <td>${row.evidenceTitle}</td>
                            <td><a href="${row.fileUrl}" target="_blank" class="file-link">📁 فتح الملف</a></td>
                        </tr>
                    `;
            tableBody.innerHTML += tr;
          });
        } catch (error) {
          document.getElementById("loading").innerText =
            "❌ حدث خطأ في الاتصال، تأكد من إعدادات الـ Script.";
        }
      }

      function logout() {
        localStorage.clear();
        window.location.href = "index.html";
      }

      // حماية إضافية
      if (localStorage.getItem("userRole") !== "مدير") {
        alert("غير مصرح لك بدخول هذه الصفحة");
        window.location.href = "index.html";
      } else {
        loadAdminData();
      }
    </script>
  </body>
</html>
