<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>لوحة التحكم - نظام الشواهد</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css"
    />
  </head>
  <body>
    <nav
      class="navbar navbar-expand-lg navbar-light bg-white shadow-sm sticky-top mb-4"
    >
      <div class="container">
        <div class="navbar-brand d-flex align-items-center">
          <div
            class="user-avatar bg-primary text-white rounded-circle d-flex justify-content-center align-items-center me-3"
            style="width: 45px; height: 45px"
          >
            <i class="bi bi-person-fill">👤</i>
          </div>
          <div>
            <h6 class="mb-0 fw-bold">
              مرحباً، <span id="displayName" class="text-primary">...</span>
            </h6>
            <small class="text-muted"
              >الدور: <span id="displayRole">...</span></small
            >
          </div>
        </div>

        <div class="ms-auto">
          <button
            class="btn btn-outline-danger btn-sm fw-bold px-3 py-2 d-flex align-items-center gap-2"
            onclick="logout()"
          >
            <span>تسجيل الخروج</span>
            <i class="bi bi-box-arrow-left">🚪</i>
          </button>
        </div>
      </div>
    </nav>

    <div class="container py-5">
      <div class="welcome-section text-center mb-5">
        <h1 class="display-6 fw-bold text-primary">قائمة شواهد التوثيق</h1>
        <p class="text-muted">
          الرجاء اختيار الشاهد المناسب لرفع الملف الخاص به
        </p>
      </div>

      <div id="evidenceContainer" class="row g-4">
        <div class="col-12 text-center py-5">
          <div class="spinner-border text-primary" role="status"></div>
          <p class="mt-2 text-secondary">جاري تحميل الشواهد المخصصة لدورك...</p>
        </div>
      </div>

      <div id="mySubmissions" class="mt-5 pt-4">
        <h3 class="mb-4 text-secondary border-bottom pb-2">
          شواهدي التي تم رفعها سابقاً
        </h3>

        <div class="card shadow-sm border-0 overflow-hidden">
          <div class="table-responsive">
            <table class="table table-hover align-middle mb-0">
              <thead class="table-light">
                <tr>
                  <th class="py-3 px-4">الشاهد</th>
                  <th class="py-3 text-center">التاريخ</th>
                  <th class="py-3 text-center">الملف</th>
                </tr>
              </thead>
              <tbody id="userSubmissionsBody">
                <tr>
                  <td colspan="3" class="text-center py-5 text-muted">
                    <div
                      class="spinner-grow spinner-grow-sm text-secondary me-2"
                    ></div>
                    جاري تحميل تاريخ مرفوعاتك...
                  </td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </div>

    <script>
      const role = localStorage.getItem("userRole");
      const name = localStorage.getItem("userName");
      const SCRIPT_URL =
        "https://script.google.com/macros/s/AKfycbzxVQCCJRZaptxBssvkq1dmn0Dk_FSKv1y-Q2UaOlIDcAT8nvMC98U34rx9ZB5Zk4sG/exec";

      if (!role) {
        window.location.href = "index.html";
      }

      document.getElementById("displayName").innerText = name;
      document.getElementById("displayRole").innerText = role;

      async function loadEvidence() {
        try {
          const response = await fetch(SCRIPT_URL, {
            method: "POST",
            body: JSON.stringify({ action: "getEvidence", role: role.trim() }),
          });
          const evidenceList = await response.json();

          const container = document.getElementById("evidenceContainer");
          container.innerHTML = "";

          if (evidenceList.length === 0) {
            container.innerHTML =
              "<p style='text-align:center; grid-column:1/-1;'>لا توجد شواهد مخصصة لدورك حالياً في النظام.</p>";
            return;
          }

          evidenceList.forEach((item) => {
            const card = `
                        <div class="card">
                            <h4>${item.title}</h4>
                            <p>${item.description}</p>
                            <button class="btn-upload" onclick="goToUpload('${item.title}')">إرفاق ملف الشاهد</button>
                        </div>
                    `;
            container.innerHTML += card;
          });
        } catch (error) {
          document.getElementById("evidenceContainer").innerHTML =
            "<p style='color:red;'>فشل تحميل البيانات. يرجى التحقق من اتصالك بالإنترنت.</p>";
        }
      }

      function goToUpload(title) {
        localStorage.setItem("selectedEvidence", title);
        window.location.href = "upload.html";
      }

      function logout() {
        localStorage.clear();
        window.location.href = "index.html";
      }

      async function loadMySubmissions() {
        const userID = localStorage.getItem("userID");
        try {
          const response = await fetch(SCRIPT_URL, {
            method: "POST",
            body: JSON.stringify({ action: "getAllSubmissions" }), // سنقوم بفلترتها هنا
          });
          const allData = await response.json();

          // فلترة البيانات لتظهر فقط ما رفعه هذا المستخدم
          const myData = allData.filter((item) => item.username === userID);
          const tbody = document.getElementById("userSubmissionsBody");
          tbody.innerHTML = "";

          if (myData.length === 0) {
            tbody.innerHTML =
              "<tr><td colspan='3'>لم تقم برفع أي شواهد بعد.</td></tr>";
            return;
          }

          myData.reverse().forEach((row) => {
            tbody.innerHTML += `
                <tr style="border-bottom: 1px solid #f5f5f5;">
                    <td style="padding:10px;">${row.evidenceTitle}</td>
                    <td style="padding:10px;">${row.date.split("T")[0]}</td>
                    <td style="padding:10px;"><a href="${row.fileUrl}" target="_blank" style="color:var(--primary-color); text-decoration:none;">👁️ عرض</a></td>
                </tr>
            `;
          });
        } catch (e) {
          console.log("خطأ في جلب المرفوعات الشخصية");
        }
      }

      // استدعِ الدالة في نهاية السكريبت
      loadMySubmissions();

      loadEvidence();
    </script>
  </body>
</html>
