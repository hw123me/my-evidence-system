<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>نظام توثيق الشواهد - الدخول</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css">
  </head>
    <body class="bg-light d-flex align-items-center vh-100">
      <div class="container">
        <div class="row justify-content-center">
          <div class="col-md-5 col-lg-4">
            <div id="loginForm" class="card shadow p-4 border-0">
              <h2 class="text-center text-primary mb-4">مرحباً بك</h2>
              <div class="mb-3">
                <label class="form-label fw-bold">اسم المستخدم</label>
                <input
                  type="text"
                  id="logUser"
                  class="form-control"
                  placeholder="أدخل اسم المستخدم"
                />
              </div>
              <div class="mb-3">
                <label class="form-label fw-bold">كلمة المرور</label>
                <input
                  type="password"
                  id="logPass"
                  class="form-control"
                  placeholder="أدخل كلمة المرور"
                />
              </div>
              <button
                onclick="login()"
                id="loginBtn"
                class="btn btn-primary w-100 fw-bold py-2"
              >
                دخول للنظام
              </button>
              <p class="text-center mt-3 small text-muted">
                ليس لديك حساب؟
                <span
                  class="text-primary fw-bold pointer"
                  style="cursor: pointer"
                  onclick="toggleForms()"
                  >سجل الآن</span
                >
              </p>
            </div>

            <div id="registerForm" class="card shadow p-4 border-0 d-none">
              <h2 class="text-center text-success mb-4">إنشاء حساب</h2>
              <div class="mb-3">
                <label class="form-label fw-bold">الاسم الكامل</label>
                <input
                  type="text"
                  id="regName"
                  class="form-control"
                  placeholder="الاسم الثلاثي"
                />
              </div>
              <div class="mb-3">
                <label class="form-label fw-bold">اسم المستخدم</label>
                <input
                  type="text"
                  id="regUser"
                  class="form-control"
                  placeholder="يستخدم للدخول"
                />
              </div>
              <div class="mb-3">
                <label class="form-label fw-bold">الدور الوظيفي</label>
                <select id="regRole" class="form-select">
                  <option value="معلم">معلم</option>
                  <option value="وكيل">وكيل</option>
                  <option value="مدير">مدير</option>
                </select>
              </div>
              <div class="mb-3">
                <label class="form-label fw-bold">كلمة المرور</label>
                <input
                  type="password"
                  id="regPass"
                  class="form-control"
                  placeholder="أرقام أو حروف"
                />
              </div>
              <button
                onclick="register()"
                class="btn btn-success w-100 fw-bold py-2"
              >
                إنشاء الحساب
              </button>
              <p class="text-center mt-3 small text-muted">
                لديك حساب بالفعل؟
                <span
                  class="text-success fw-bold pointer"
                  style="cursor: pointer"
                  onclick="toggleForms()"
                  >سجل دخولك</span
                >
              </p>
            </div>
          </div>
        </div>

        
      </div>
    
    <script>
      const SCRIPT_URL =
        "https://script.google.com/macros/s/AKfycbzxVQCCJRZaptxBssvkq1dmn0Dk_FSKv1y-Q2UaOlIDcAT8nvMC98U34rx9ZB5Zk4sG/exec";

      function toggleForms() {
        document.getElementById("loginForm").classList.toggle("hidden");
        document.getElementById("registerForm").classList.toggle("hidden");
      }

      async function register() {
        const payload = {
          action: "register",
          fullname: document.getElementById("regName").value.trim(),
          username: document.getElementById("regUser").value.trim(),
          role: document.getElementById("regRole").value,
          password: document.getElementById("regPass").value,
        };

        if (!payload.fullname || !payload.username || !payload.password) {
          alert("يرجى تعبئة كافة الحقول");
          return;
        }

        try {
          const response = await fetch(SCRIPT_URL, {
            method: "POST",
            body: JSON.stringify(payload),
          });
          const result = await response.json();

          if (result === "exists") {
            alert("اسم المستخدم موجود مسبقاً، اختر اسماً آخر");
          } else if (result === "success") {
            alert("تم التسجيل بنجاح! يمكنك الآن تسجيل الدخول");
            toggleForms();
          }
        } catch (e) {
          alert("حدث خطأ أثناء الاتصال، يرجى المحاولة لاحقاً");
        }
      }

      async function login() {
        const loginBtn = document.getElementById("loginBtn");
        const originalContent = loginBtn.innerHTML; // حفظ نص "دخول للنظام" لاستعادته لاحقاً

        const payload = {
          action: "login",
          username: document.getElementById("logUser").value.trim(),
          password: document.getElementById("logPass").value,
        };

        if (!payload.username || !payload.password) {
          alert("يرجى إدخال اسم المستخدم وكلمة المرور");
          return;
        }

        // --- بدء حالة التحميل ---
        loginBtn.disabled = true; // تعطيل الزر
        loginBtn.classList.add("btn-loading");
        loginBtn.innerHTML = '<div class="spinner"></div> جاري التحقق...';

        try {
          const response = await fetch(SCRIPT_URL, {
            method: "POST",
            body: JSON.stringify(payload),
          });
          const result = await response.json();

          if (result.status === "success") {
            // حفظ البيانات والانتقال
            localStorage.setItem("userName", result.fullname);
            localStorage.setItem("userRole", result.role);
            localStorage.setItem("userID", payload.username);

            const userRole = result.role.trim();
            if (userRole === "مدير") {
              window.location.href = "admin.html";
            } else {
              window.location.href = "dashboard.html";
            }
          } else {
            alert("اسم المستخدم أو كلمة المرور غير صحيحة");
            // --- استعادة الزر في حال فشل البيانات ---
            resetButton(loginBtn, originalContent);
          }
        } catch (e) {
          alert("فشل الدخول، تحقق من إعدادات الـ Script");
          // --- استعادة الزر في حال فشل الاتصال ---
          resetButton(loginBtn, originalContent);
        }
      }

      // دالة مساعدة لإعادة الزر لحالته الطبيعية
      function resetButton(btn, content) {
        btn.disabled = false;
        btn.classList.remove("btn-loading");
        btn.innerHTML = content;
      }
    </script>
  </body>
</html>
