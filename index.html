<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>نظام توثيق الشواهد - الدخول</title>
    <style>
      :root {
        --primary-color: #1a73e8;
        --secondary-color: #1557b0;
        --bg-gradient: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
        --white: #ffffff;
        --text-color: #333;
        --shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
      }

      body {
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background: var(--bg-gradient);
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
        color: var(--text-color);
      }

      .container {
        background: var(--white);
        padding: 2.5rem;
        border-radius: 15px;
        box-shadow: var(--shadow);
        width: 100%;
        max-width: 420px;
        transition: transform 0.3s ease;
      }

      h2 {
        text-align: center;
        color: var(--primary-color);
        margin-bottom: 1.5rem;
        font-weight: 600;
      }

      .form-group {
        margin-bottom: 1.2rem;
      }

      label {
        display: block;
        margin-bottom: 8px;
        font-size: 0.9rem;
        font-weight: 600;
        color: #555;
      }

      input,
      select {
        width: 100%;
        padding: 12px;
        border: 2px solid #eee;
        border-radius: 8px;
        box-sizing: border-box;
        font-size: 1rem;
        transition: border-color 0.3s ease;
      }

      input:focus,
      select:focus {
        border-color: var(--primary-color);
        outline: none;
      }

      button {
        width: 100%;
        padding: 12px;
        background-color: var(--primary-color);
        color: white;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        font-size: 1.1rem;
        font-weight: bold;
        margin-top: 1rem;
        transition:
          background-color 0.3s ease,
          transform 0.2s ease;
      }

      button:hover {
        background-color: var(--secondary-color);
        transform: translateY(-2px);
      }

      button:active {
        transform: translateY(0);
      }

      .toggle-link {
        text-align: center;
        margin-top: 20px;
        font-size: 0.9rem;
        color: #666;
        cursor: pointer;
      }

      .toggle-link span {
        color: var(--primary-color);
        font-weight: bold;
        text-decoration: underline;
      }

      .hidden {
        display: none;
      }

      /* تحسين استجابة الجوال */
      @media (max-width: 480px) {
        .container {
          padding: 1.5rem;
          margin: 10px;
        }
      }
      /* تنسيق حالة التحميل داخل الزر */
      .btn-loading {
        cursor: not-allowed;
        opacity: 0.7;
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 10px;
      }

      /* شكل الدوامة (Spinner) */
      .spinner {
        width: 18px;
        height: 18px;
        border: 3px solid rgba(255, 255, 255, 0.3);
        border-radius: 50%;
        border-top-color: #fff;
        animation: spin 1s ease-in-out infinite;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div id="loginForm">
        <h2>مرحباً بك</h2>
        <div class="form-group">
          <label>اسم المستخدم</label>
          <input type="text" id="logUser" placeholder="أدخل اسم المستخدم" />
        </div>
        <div class="form-group">
          <label>كلمة المرور</label>
          <input type="password" id="logPass" placeholder="أدخل كلمة المرور" />
        </div>
        <button onclick="login()" id="loginBtn">دخول للنظام</button>
        <p class="toggle-link" onclick="toggleForms()">
          ليس لديك حساب؟ <span>سجل الآن</span>
        </p>
      </div>

      <div id="registerForm" class="hidden">
        <h2>إنشاء حساب</h2>
        <div class="form-group">
          <label>الاسم الكامل</label>
          <input type="text" id="regName" placeholder="الاسم الثلاثي" />
        </div>
        <div class="form-group">
          <label>اسم المستخدم</label>
          <input type="text" id="regUser" placeholder="يستخدم للدخول" />
        </div>
        <div class="form-group">
          <label>الدور الوظيفي</label>
          <select id="regRole">
            <option value="معلم">معلم</option>
            <option value="وكيل">وكيل</option>
            <option value="موجه طلابي">موجه طلابي</option>
            <option value="رائد نشاط">رائد نشاط</option>
            <option value="محضر مختبر">محضر مختبر</option>
            <option value="مدير">مدير</option>
          </select>
        </div>
        <div class="form-group">
          <label>كلمة المرور</label>
          <input type="password" id="regPass" placeholder="أرقام أو حروف" />
        </div>
        <button onclick="register()">إنشاء الحساب</button>
        <p class="toggle-link" onclick="toggleForms()">
          لديك حساب بالفعل؟ <span>سجل دخولك</span>
        </p>
      </div>
    </div>

    <script>
      const SCRIPT_URL =
        "https://script.google.com/macros/s/AKfycbzxVQCCJRZaptxBssvkq1dmn0Dk_FSKv1y-Q2UaOlIDcAT8nvMC98U34rx9ZB5Zk4sG/exec";

      function toggleForms() {
        document.getElementById("loginForm").classList.toggle("hidden");
        document.getElementById("registerForm").classList.toggle("hidden");
      }

      async function register() {
        const payload = {
          action: "register",
          fullname: document.getElementById("regName").value.trim(),
          username: document.getElementById("regUser").value.trim(),
          role: document.getElementById("regRole").value,
          password: document.getElementById("regPass").value,
        };

        if (!payload.fullname || !payload.username || !payload.password) {
          alert("يرجى تعبئة كافة الحقول");
          return;
        }

        try {
          const response = await fetch(SCRIPT_URL, {
            method: "POST",
            body: JSON.stringify(payload),
          });
          const result = await response.json();

          if (result === "exists") {
            alert("اسم المستخدم موجود مسبقاً، اختر اسماً آخر");
          } else if (result === "success") {
            alert("تم التسجيل بنجاح! يمكنك الآن تسجيل الدخول");
            toggleForms();
          }
        } catch (e) {
          alert("حدث خطأ أثناء الاتصال، يرجى المحاولة لاحقاً");
        }
      }

      async function login() {
        const loginBtn = document.getElementById("loginBtn");
        const originalContent = loginBtn.innerHTML; // حفظ نص "دخول للنظام" لاستعادته لاحقاً

        const payload = {
          action: "login",
          username: document.getElementById("logUser").value.trim(),
          password: document.getElementById("logPass").value,
        };

        if (!payload.username || !payload.password) {
          alert("يرجى إدخال اسم المستخدم وكلمة المرور");
          return;
        }

        // --- بدء حالة التحميل ---
        loginBtn.disabled = true; // تعطيل الزر
        loginBtn.classList.add("btn-loading");
        loginBtn.innerHTML = '<div class="spinner"></div> جاري التحقق...';

        try {
          const response = await fetch(SCRIPT_URL, {
            method: "POST",
            body: JSON.stringify(payload),
          });
          const result = await response.json();

          if (result.status === "success") {
            // حفظ البيانات والانتقال
            localStorage.setItem("userName", result.fullname);
            localStorage.setItem("userRole", result.role);
            localStorage.setItem("userID", payload.username);

            const userRole = result.role.trim();
            if (userRole === "مدير") {
              window.location.href = "admin.html";
            } else {
              window.location.href = "dashboard.html";
            }
          } else {
            alert("اسم المستخدم أو كلمة المرور غير صحيحة");
            // --- استعادة الزر في حال فشل البيانات ---
            resetButton(loginBtn, originalContent);
          }
        } catch (e) {
          alert("فشل الدخول، تحقق من إعدادات الـ Script");
          // --- استعادة الزر في حال فشل الاتصال ---
          resetButton(loginBtn, originalContent);
        }
      }

      // دالة مساعدة لإعادة الزر لحالته الطبيعية
      function resetButton(btn, content) {
        btn.disabled = false;
        btn.classList.remove("btn-loading");
        btn.innerHTML = content;
      }
    </script>
  </body>
</html>
