<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <title>رفع الشاهد</title>
    <style>
      body {
        font-family: Arial;
        background: #f4f4f4;
        padding: 20px;
        text-align: center;
      }
      .upload-box {
        background: white;
        padding: 30px;
        border-radius: 10px;
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
        max-width: 500px;
        margin: auto;
      }
      input[type="file"] {
        margin: 20px 0;
      }
      #status {
        margin-top: 20px;
        color: #1a73e8;
        font-weight: bold;
      }
      .btn-back {
        background: #6c757d;
        color: white;
        border: none;
        padding: 10px 20px;
        border-radius: 5px;
        cursor: pointer;
        margin-top: 20px;
      }
    </style>
  </head>
  <body>
    <div class="upload-box">
      <h3>رفع شاهد: <span id="targetEvidence"></span></h3>
      <p>المستخدم: <span id="userDisplay"></span></p>

      <input type="file" id="fileInput" />
      <br />
      <button
        onclick="uploadProcess()"
        style="
          background: #28a745;
          color: white;
          padding: 10px 30px;
          border: none;
          border-radius: 5px;
          cursor: pointer;
        "
      >
        ابدأ الرفع الآن
      </button>

      <div id="status"></div>
      <button class="btn-back" onclick="location.href = 'dashboard.html'">
        العودة للوحة التحكم
      </button>
    </div>

    <script>
      const SCRIPT_URL =
        "https://script.google.com/macros/s/AKfycbzxVQCCJRZaptxBssvkq1dmn0Dk_FSKv1y-Q2UaOlIDcAT8nvMC98U34rx9ZB5Zk4sG/exec"; // ضع رابط الـ Web App الخاص بك هنا

      const selectedEvidence = localStorage.getItem("selectedEvidence");
      const username = localStorage.getItem("userID");

      document.getElementById("targetEvidence").innerText = selectedEvidence;
      document.getElementById("userDisplay").innerText = username;

      function uploadProcess() {
        const fileInput = document.getElementById("fileInput");
        const status = document.getElementById("status");

        if (fileInput.files.length === 0) {
          alert("الرجاء اختيار ملف أولاً");
          return;
        }

        const file = fileInput.files[0];
        const reader = new FileReader();
        status.innerText = "جاري معالجة الملف...";

        reader.onload = async function (e) {
          const base64Data = e.target.result.split(",")[1];
          const payload = {
            action: "uploadFile",
            username: username,
            evidenceTitle: selectedEvidence,
            fileName: file.name,
            mimeType: file.type,
            base64Data: base64Data,
          };

          status.innerText = "جاري الرفع إلى السحابة... يرجى الانتظار";

          try {
            console.log("إرسال البيانات إلى:", SCRIPT_URL);
            const response = await fetch(SCRIPT_URL, {
              method: "POST",
              body: JSON.stringify(payload),
            });

            // إذا كنت تستخدم mode: 'no-cors' فلن تستطيع قراءة result.json()
            // جرب تشغيل الكود بدون no-cors أولاً، فإذا ظهر خطأ CORS، سنغير الاستراتيجية.
            const result = await response.json();
            console.log("رد السيرفر:", result);

            if (result.status === "success") {
              status.innerHTML = "✅ تم الرفع بنجاح!";
              fileInput.value = "";
            } else {
              status.innerText = "❌ خطأ من السيرفر: " + result.message;
            }
          } catch (error) {
            console.error("Error Detail:", error);
            status.innerText =
              "❌ تعذر الاتصال أو قراءة الرد (تحقق من Console)";
          }
        };

        reader.readAsDataURL(file);
      }
    </script>
  </body>
</html>
