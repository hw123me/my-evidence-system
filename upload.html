<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>رفع الشاهد - نظام التوثيق</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="upload-card">
        <div class="header-box">
            <h3>رفع شاهد: <span id="targetEvidence">...</span></h3>
            <p>المستخدم: <strong id="userDisplay">...</strong></p>
        </div>

        <div class="file-drop-area" id="dropArea">
            <div class="file-icon">📁</div>
            <span id="fileNameDisplay">اضغط هنا لاختيار الملف أو اسحبه إلى هنا</span>
            <input type="file" id="fileInput" onchange="updateFileName()" />
        </div>

        <button class="btn-main" onclick="uploadProcess()">
            ابدأ عملية الرفع
        </button>

        <div id="status"></div>

        <button class="btn-back" onclick="location.href = 'dashboard.html'">
            ← العودة للوحة التحكم
        </button>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzxVQCCJRZaptxBssvkq1dmn0Dk_FSKv1y-Q2UaOlIDcAT8nvMC98U34rx9ZB5Zk4sG/exec";

        const selectedEvidence = localStorage.getItem("selectedEvidence");
        const username = localStorage.getItem("userID");

        document.getElementById("targetEvidence").innerText = selectedEvidence || "غير محدد";
        document.getElementById("userDisplay").innerText = username || "زائر";

        function updateFileName() {
            const input = document.getElementById('fileInput');
            const display = document.getElementById('fileNameDisplay');
            if (input.files.length > 0) {
                display.innerText = "تم اختيار: " + input.files[0].name;
                display.style.color = "#1a73e8";
                display.style.fontWeight = "bold";
            }
        }

        function uploadProcess() {
            const fileInput = document.getElementById("fileInput");
            const status = document.getElementById("status");

            if (fileInput.files.length === 0) {
                alert("الرجاء اختيار ملف أولاً");
                return;
            }

            const file = fileInput.files[0];
            const reader = new FileReader();
            status.innerHTML = '<span class="loading">⏳ جاري معالجة الملف...</span>';

            reader.onload = async function (e) {
                const base64Data = e.target.result.split(",")[1];
                const payload = {
                    action: "uploadFile",
                    username: username,
                    evidenceTitle: selectedEvidence,
                    fileName: file.name,
                    mimeType: file.type,
                    base64Data: base64Data,
                };

                status.innerHTML = '<span class="loading">☁️ جاري الرفع للسحابة... يرجى الانتظار</span>';

                try {
                    const response = await fetch(SCRIPT_URL, {
                        method: "POST",
                        body: JSON.stringify(payload),
                    });
                    const result = await response.json();

                    if (result.status === "success") {
                        status.innerHTML = "<b style='color:#28a745;'>✅ تم الرفع بنجاح وحفظ الرابط!</b>";
                        fileInput.value = "";
                        document.getElementById('fileNameDisplay').innerText = "اضغط لاختيار ملف آخر";
                    } else {
                        status.innerHTML = "<b style='color:#dc3545;'>❌ خطأ: " + result.message + "</b>";
                    }
                } catch (error) {
                    status.innerHTML = "<b style='color:#dc3545;'>❌ حدث خطأ في الاتصال بالسيرفر</b>";
                }
            };

            reader.readAsDataURL(file);
        }
    </script>
</body>
</html>
