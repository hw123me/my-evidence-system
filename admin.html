<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>إدارة النظام - استعراض الشواهد</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />

    <link rel="stylesheet" href="style.css" />
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/MrRio/jsPDF/dist/jspdf.customfonts.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  </head>
  <body>
    <nav class="navbar navbar-expand-lg navbar-dark shadow mb-4 royal-navbar">
      <div class="container">
        <a class="navbar-brand d-flex align-items-center" href="#">
          <div class="royal-icon-box me-2">
            <i class="fas fa-award"></i>
          </div>
          <div class="brand-text">
            <span class="d-block fw-bold mb-0 title-main"
              >إدارة الشواهد المدرسية</span
            >
            <small class="title-sub"
              >مجمع الإمام يعقوب البصري وأبو عمرو البصري
            </small>
          </div>
        </a>

        <div class="d-flex align-items-center">
          <div
            class="user-pill-royal d-none d-md-flex align-items-center me-3"
            id="userInfo"
          >
            <i class="fas fa-user-shield gold-text"></i>
            <span class="ms-2 small">جاري التحقق...</span>
          </div>

          <button onclick="logout()" class="btn btn-royal-logout">
            <i class="fas fa-sign-out-alt"></i>
            <span class="d-none d-sm-inline ms-1">تسجيل الخروج</span>
          </button>
        </div>
      </div>
    </nav>

    <div class="container pb-5">
      <div class="d-flex gap-2">
        <button class="btn btn-success btn-sm" onclick="exportToExcel()">
          <i class="fas fa-file-excel me-1"></i> Excel
        </button>
        <button class="btn btn-danger btn-sm" onclick="exportToPDF()">
          <i class="fas fa-file-pdf me-1"></i> PDF
        </button>
        <button
          class="btn btn-outline-secondary btn-sm"
          onclick="loadAdminData()"
        >
          تحديث ↻
        </button>
      </div>
      <ul class="nav nav-pills mb-4 royal-tabs" id="adminTabs" role="tablist">
        <li class="nav-item">
          <button
            class="nav-link active fw-bold"
            id="evidences-tab"
            data-bs-toggle="pill"
            data-bs-target="#evidences-content"
            type="button"
          >
            <i class="fas fa-file-signature me-1"></i> استعراض الشواهد
          </button>
        </li>
        <li class="nav-item">
          <button
            class="nav-link fw-bold"
            id="users-tab"
            data-bs-toggle="pill"
            data-bs-target="#users-content"
            type="button"
            onclick="loadRegisteredUsers()"
          >
            <i class="fas fa-users-cog me-1"></i> إدارة المعلمين
          </button>
        </li>
        <li class="nav-item">
          <button
            class="nav-link"
            id="upload-tab"
            data-bs-toggle="tab"
            data-bs-target="#upload"
            type="button"
          >
            <i class="fas fa-cloud-upload-alt me-2"></i>رفع الشواهد
          </button>
        </li>
      </ul>
      <div class="row g-4 mb-4">
        <div class="col-md-6">
          <div
            class="card stat-card-custom border-0 shadow-sm p-2 border-start border-primary border-5 h-100"
          >
            <div class="card-body d-flex align-items-center">
              <div class="icon-box me-3">📊</div>
              <div>
                <h6 class="text-muted mb-1 small fw-bold text-uppercase">
                  إجمالي الشواهد
                </h6>
                <h2 id="totalCount" class="mb-0 fw-bold text-primary">0</h2>
              </div>
            </div>
          </div>
        </div>
        <div class="col-md-6">
          <div
            class="card stat-card-custom border-0 shadow-sm p-2 border-start border-success border-5 h-100"
          >
            <div class="card-body d-flex align-items-center">
              <div
                class="icon-box me-3 text-success"
                style="background: rgba(25, 135, 84, 0.1)"
              >
                📅
              </div>
              <div>
                <h6 class="text-muted mb-1 small fw-bold text-uppercase">
                  تحديثات اليوم
                </h6>
                <h2 id="todayCount" class="mb-0 fw-bold text-success">0</h2>
              </div>
            </div>
          </div>
        </div>
      </div>

      <div class="row mb-4">
        <div class="col-12">
          <div class="input-group shadow-sm border-0 rounded-3 overflow-hidden">
            <span class="input-group-text bg-white border-0 ps-3">🔍</span>
            <input
              type="text"
              id="adminSearch"
              class="form-control border-0 py-3"
              placeholder="ابحث باسم المعلم أو عنوان الشاهد..."
              onkeyup="filterAdminTable()"
            />
          </div>
        </div>
      </div>
      <div class="tab-content">
        <div
          class="tab-pane fade show active"
          id="evidences-content"
          role="tabpanel"
        >
          <div class="card shadow-sm border-0 rounded-4 overflow-hidden">
            <div
              class="card-header bg-white py-3 border-bottom d-flex justify-content-between align-items-center"
            >
              <h5 class="mb-0 fw-bold text-dark">سجل المرفوعات الأخير</h5>
              <span class="badge bg-secondary rounded-pill fw-light px-3"
                >محدث لحظياً</span
              >
            </div>
            <div class="card-body p-0">
              <div id="loading" class="text-center py-5">
                <div class="spinner-border text-primary" role="status"></div>
                <p class="mt-3 text-secondary fw-bold">
                  جاري جلب بيانات الشواهد المرفوعة...
                </p>
              </div>

              <div class="table-responsive">
                <table
                  id="adminTable"
                  class="table table-hover align-middle mb-0 text-center"
                  style="display: none"
                >
                  <thead class="table-light">
                    <tr>
                      <th class="py-3 px-4 text-start">الوقت والتاريخ</th>
                      <th class="py-3">المرحلة</th>
                      <th class="py-3">اسم المعلم</th>
                      <th class="py-3">المجال</th>
                      <th class="py-3">المعيار</th>
                      <th class="py-3">الإجراء</th>
                    </tr>
                  </thead>
                  <tbody id="adminBody"></tbody>
                </table>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script>
      const SCRIPT_URL =
        "https://script.google.com/macros/s/AKfycbzxVQCCJRZaptxBssvkq1dmn0Dk_FSKv1y-Q2UaOlIDcAT8nvMC98U34rx9ZB5Zk4sG/exec";

      if (localStorage.getItem("userRole") !== "مدير") {
        window.location.href = "index.html";
      } else {
        loadAdminData();
      }
      const role = localStorage.getItem("userRole");
      const name = localStorage.getItem("userName");
      const stage = localStorage.getItem("userStage");
      document.getElementById("userInfo").innerHTML = `
        <i class="fas fa-user-circle me-1"></i> ${name} 
        <span class="badge bg-light text-dark ms-2">${stage}</span>
        <span class="badge bg-info ms-1">${role}</span>
      `;
      async function loadAdminData() {
        try {
          const response = await fetch(SCRIPT_URL, {
            method: "POST",
            body: JSON.stringify({ action: "getAllSubmissions" }),
          });
          const data = await response.json();

          document.getElementById("loading").style.display = "none";
          document.getElementById("adminTable").style.display = "table";

          // تحديث الأرقام
          document.getElementById("totalCount").innerText = data.length;
          const today = new Date().toLocaleDateString();
          const todaySubmissions = data.filter(
            (row) =>
              row.date && new Date(row.date).toLocaleDateString() === today,
          ).length;
          document.getElementById("todayCount").innerText = todaySubmissions;

          const tableBody = document.getElementById("adminBody");
          tableBody.innerHTML = "";
          data.reverse().forEach((row) => {
            const tr = `
                        <tr>
                            <td class="px-4 text-start small text-muted">${new Date(row.date).toLocaleString("ar-SA")}</td>
                            <td class="fw-bold text-dark">${row.stage}</td>
                            <td class="fw-bold text-dark">${row.username}</td>
                            <td><span class="badge bg-info-subtle text-info border border-info-subtle px-3 py-2 rounded-2">${row.domain}</span></td>
                             <td><span class="badge bg-info-subtle text-info border border-info-subtle px-3 py-2 rounded-2">${row.code}:${row.standard}</span></td>
 
                            <td>
                                <a href="${row.fileUrl}" target="_blank" class="btn btn-primary btn-sm px-3 fw-bold shadow-sm">👁️  </a>
                            <button onclick="deleteFile('${row.fileId}', '${row.username}', this)" class="btn btn-sm btn-outline-danger py-0">🗑️</button>
                                </td>
                        </tr>`;
            tableBody.innerHTML += tr;
          });
        } catch (error) {
          document.getElementById("loading").innerHTML =
            `<div class="alert alert-danger m-3">❌ حدث خطأ في الاتصال بالسيرفر.</div>`;
        }
      }

      function filterAdminTable() {
        let input = document.getElementById("adminSearch");
        let filter = input.value.toLowerCase();
        let table = document.getElementById("adminTable");
        let tr = table.getElementsByTagName("tr");

        for (let i = 1; i < tr.length; i++) {
          let tdName = tr[i].getElementsByTagName("td")[1];
          let tdTitle = tr[i].getElementsByTagName("td")[3];
          if (tdName || tdTitle) {
            let textValue =
              (tdName.textContent || tdName.innerText) +
              " " +
              (tdTitle.textContent || tdTitle.innerText);
            tr[i].style.display =
              textValue.toLowerCase().indexOf(filter) > -1 ? "" : "none";
          }
        }
      }
      async function deleteFile(fileId, username, btnElement) {
        if (!confirm("هل أنت متأكد من حذف هذا الملف نهائياً؟")) return;

        // 1. حفظ الشكل الأصلي للزر وتعطيله
        const originalContent = btnElement.innerHTML;
        btnElement.disabled = true;
        btnElement.innerHTML = `<span class="spinner-border spinner-border-sm" role="status" aria-hidden="true"></span>`;

        try {
          const response = await fetch(SCRIPT_URL, {
            method: "POST",
            body: JSON.stringify({
              action: "deleteFile",
              fileId: fileId,
              username: username,
            }),
          });

          const result = await response.json();

          if (result.status === "success") {
            // إعادة تحميل البيانات (السبينر سيختفي تلقائياً لأن الجدول سيعاد بناؤه)
            loadAdminData();
          } else {
            alert("خطأ: " + result.message);
            // إعادة الزر لحالته الأصلية في حال فشل السيرفر
            btnElement.disabled = false;
            btnElement.innerHTML = originalContent;
          }
        } catch (e) {
          alert("فشل الاتصال بالسيرفر");
          // إعادة الزر لحالته الأصلية في حال فشل الاتصال
          btnElement.disabled = false;
          btnElement.innerHTML = originalContent;
        }
      }
      function logout() {
        localStorage.clear();
        window.location.href = "index.html";
      }
      function exportToExcel() {
        // جلب البيانات المعروضة حالياً في الجدول فقط
        const table = document.getElementById("adminBody");
        const rows = Array.from(table.rows);

        // تجهيز البيانات بتنسيق مصفوفة
        const data = rows.map((row) => ({
          المرحلة: row.cells[0].innerText,
          المجال: row.cells[1].innerText,
          المؤشر: row.cells[2].innerText,
          بواسطة: row.cells[3].innerText,
          التاريخ: row.cells[4].innerText,
        }));

        const worksheet = XLSX.utils.json_to_sheet(data);
        const workbook = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(workbook, worksheet, "الشواهد");

        // تحميل الملف باسم يحتوي على التاريخ الحالي
        const fileName = `تقرير_الشواهد_${new Date().toLocaleDateString("ar-SA")}.xlsx`;
        XLSX.writeFile(workbook, fileName);
      }

      function exportToPDF() {
        const table = document.getElementById("adminBody").parentElement;
        if (!table) return;

        const tempDiv = document.createElement("div");
        tempDiv.style.padding = "15px";
        tempDiv.style.direction = "rtl";

        // إضافة ترويسة التقرير
        const headerHtml = `
        <div style="text-align:center; margin-bottom:15px; font-family: Arial, sans-serif;">
            <h2 style="color:#064e3b; margin:0; font-size: 22px;">تقرير الشواهد المدرسية  </h2>
            <p style="color:#859147; font-weight:bold; margin:5px 0;">مجمع الإمام يعقوب البصري وأبو عمرو البصري</p>
            <div style="border-bottom: 2px solid #d4af37; width: 50%; margin: 10px auto;"></div>
        </div>`;

        const tableClone = table.cloneNode(true);
        tableClone.style.width = "100%";
        tableClone.style.fontSize = "12px";

        // إزالة عمود الإجراءات نهائياً
        const rows = tableClone.querySelectorAll("tr");
        rows.forEach((row) => {
          if (row.lastElementChild) row.lastElementChild.remove();
        });

        tempDiv.innerHTML = headerHtml;
        tempDiv.appendChild(tableClone);
        document.body.appendChild(tempDiv);

        const opt = {
          margin: [15, 10, 20, 10],
          filename: "تقرير_الشواهد_المدرسية.pdf",
          html2canvas: {
            scale: 2,
            useCORS: true,
            letterRendering: true,
          },
          jsPDF: { unit: "mm", format: "a4", orientation: "landscape" },
        };

        html2pdf()
          .set(opt)
          .from(tempDiv)
          .toPdf()
          .get("pdf")
          .then(function (pdf) {
            const totalPages = pdf.internal.getNumberOfPages();
            for (let i = 1; i <= totalPages; i++) {
              pdf.setPage(i);
              pdf.setFontSize(10);
              pdf.setTextColor(150);

              // الترقيم في المنتصف بالأسفل
              const pageText = "Page " + i + " of " + totalPages;
              pdf.text(
                pageText,
                pdf.internal.pageSize.getWidth() / 2,
                pdf.internal.pageSize.getHeight() - 10,
                { align: "center" },
              );

              // التاريخ في جهة اليسار
              const dateStr = new Date().toLocaleDateString("en-GB");
              pdf.setFontSize(8);
              pdf.text(
                "Exported: " + dateStr,
                15,
                pdf.internal.pageSize.getHeight() - 10,
              );
            }
          })
          .save()
          .then(() => {
            document.body.removeChild(tempDiv);
          });
      }
    </script>
  </body>
</html>
