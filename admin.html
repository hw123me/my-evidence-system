<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>إدارة النظام - استعراض الشواهد</title>
    <link rel="stylesheet" href="style.css">
  </head>
  <body>
    <header class="admin-header">
      <h1>إدارة الشواهد | لوحة التحكم للمدير</h1>
      <button class="btn-logout" onclick="logout()">خروج</button>
    </header>

    <div class="main-content">
      <div class="stats-summary">
        <div class="stat-card">
          <h3>إجمالي الشواهد</h3>
          <p id="totalCount">0</p>
        </div>
        <div class="stat-card">
          <h3>تحديثات اليوم</h3>
          <p id="todayCount">0</p>
        </div>
      </div>

      <div class="table-container">
        <div id="loading">جاري جلب بيانات الشواهد المرفوعة...</div>
        <table id="adminTable" style="display: none">
          <thead>
            <tr>
              <th>الوقت والتاريخ</th>
              <th>المعلم</th>
              <th>اسم الشاهد</th>
              <th>الإجراء</th>
            </tr>
          </thead>
          <tbody id="adminBody"></tbody>
        </table>
      </div>
    </div>

    <script>
      const SCRIPT_URL =
        "https://script.google.com/macros/s/AKfycbzxVQCCJRZaptxBssvkq1dmn0Dk_FSKv1y-Q2UaOlIDcAT8nvMC98U34rx9ZB5Zk4sG/exec";

      async function loadAdminData() {
        try {
          const response = await fetch(SCRIPT_URL, {
            method: "POST",
            body: JSON.stringify({ action: "getAllSubmissions" }),
          });
          const data = await response.json();

          const tableBody = document.getElementById("adminBody");
          document.getElementById("loading").style.display = "none";
          document.getElementById("adminTable").style.display = "table";

          // حساب الإحصائيات البسيطة
          document.getElementById("totalCount").innerText = data.length;

          // 1. الحصول على تاريخ اليوم بتنسيق محلي (مثلاً: 11/3/2026)
          const today = new Date().toLocaleDateString();

          // 2. فلترة البيانات مع تحويل تاريخ كل صف إلى تنسيق محلي قبل المقارنة
          const todaySubmissions = data.filter((row) => {
            // نتحقق من وجود تاريخ أولاً، ثم نحوله لتنسيق محلي للمقارنة
            if (!row.date) return false;
            const rowDate = new Date(row.date).toLocaleDateString();
            return rowDate === today;
          }).length;

          // 3. عرض النتيجة
          document.getElementById("todayCount").innerText = todaySubmissions;

          data.reverse().forEach((row) => {
            const tr = `
                        <tr>
                            <td>${row.date}</td>
                            <td style="font-weight:bold;">${row.username}</td>
                            <td>${row.evidenceTitle}</td>
                            <td><a href="${row.fileUrl}" target="_blank" class="file-link">📁 فتح الملف</a></td>
                        </tr>
                    `;
            tableBody.innerHTML += tr;
          });
        } catch (error) {
          document.getElementById("loading").innerText =
            "❌ حدث خطأ في الاتصال، تأكد من إعدادات الـ Script.";
        }
      }

      function logout() {
        localStorage.clear();
        window.location.href = "index.html";
      }

      // حماية إضافية
      if (localStorage.getItem("userRole") !== "مدير") {
        alert("غير مصرح لك بدخول هذه الصفحة");
        window.location.href = "index.html";
      } else {
        loadAdminData();
      }
    </script>
  </body>
</html>
